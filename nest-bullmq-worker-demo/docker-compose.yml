version: "3.8"
services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redis-insight:
    image: redis/redisinsight:2.68
    depends_on:
      - redis
    ports:
      - "5540:5540"
    environment:
      RI_APP_HOST: 0.0.0.0
      RI_APP_PORT: 5540

volumes:
  redis-data:
